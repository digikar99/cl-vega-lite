<!DOCTYPE html>
<html>
  <head>
    <title>Vega-Lite</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.jsdelivr.net/npm/vega@6.2.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/vega-lite@6.4.2"></script>
    <script src="https://cdn.jsdelivr.net/npm/vega-embed@7.1.0"></script>

    <style media="screen">
      /* Add space between Vega-Embed links  */
      .vega-actions a {
          margin-right: 5px;
      }
    </style>
    <!-- <link rel="stylesheet" href="index.css"> -->
  </head>
  <body>

    <div style="margin:0;
                height:100vh;
                width:100vw;
                display:flex;
                align-items:center;
                justify-content:center;">
      <!-- Container for the visualization -->
      <div id="vis">No plots yet!</div>
    </div>

    <script>
      var old_vlspec_string = "";
      var vembed_result = null;

      function url(filename){
          const xmlhttp = new XMLHttpRequest();
          let obj = null;
          xmlhttp.onload = function() {
              obj = this.responseText;
          };
          xmlhttp.open("GET", filename, false);
          xmlhttp.send();
          return obj;
      }

      async function update_plot_if_required(new_vlspec_string){
          if (new_vlspec_string != old_vlspec_string){
              vembed_result = await vegaEmbed("#vis", JSON.parse(new_vlspec_string));
              old_vlspec_string = new_vlspec_string;
          }
      }

      const vls = new WebSocket("./vega-lite-string/");
      vls.addEventListener("message", (event) => {
          update_plot_if_required(event.data)
      })


      const sps = new WebSocket("./save-plot/");

      async function save_plot_and_send(data){
          const format = data.format;
          let image_data = null;
          if (format == "png"){
              const url = await vembed_result.view.toImageURL(format);
              image_data = url.split(',')[1];
          }else if (format == "svg"){
              image_data = await vembed_result.view.toSVG();
          }
          sps.send(JSON.stringify({
              filename: data.filename,
              data: image_data,
              format: data.format
          }));
      }

      sps.addEventListener("message", (event) => {
          const data = JSON.parse(event.data);
          save_plot_and_send(data);
      })

    </script>
  </body>
</html>
