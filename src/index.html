<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN">
<html>
  <head>
    <title>Vega-Lite</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.jsdelivr.net/npm/vega@6.2.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/vega-lite@6.4.2"></script>
    <script src="https://cdn.jsdelivr.net/npm/vega-embed@7.1.0"></script>

    <style media="screen">
      /* Add space between Vega-Embed links  */
      .vega-actions a {
          margin-right: 5px;
      }
    </style> 
    <!-- <link rel="stylesheet" href="index.css"> -->
  </head>
  <body>

    <div style="margin:0;
                height:100vh;
                width:100vw;
                display:flex;
                align-items:center;
                justify-content:center;">
      <!-- Container for the visualization -->
      <div id="vis"></div>
    </div>

    <script>
      var old_vlspec_string = "";

      function json(filename){
          const xmlhttp = new XMLHttpRequest();
          let obj = null;
          xmlhttp.onload = function() {
              obj = this.responseText;
          };
          xmlhttp.open("GET", filename, false);
          xmlhttp.send();
          return obj;
      }

      function update_plot_if_required(){
          const new_vlspec_string = json("./vega-lite-string/");
          if (new_vlspec_string != old_vlspec_string){
              vegaEmbed("#vis", JSON.parse(new_vlspec_string));
              old_vlspec_string = new_vlspec_string;
          }
      }

      setInterval(update_plot_if_required, 500);
      update_plot_if_required();

    </script>
  </body>
</html>
